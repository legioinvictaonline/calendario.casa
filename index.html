  .b-personal { background: #5a8abf; color: #fff; }

  .now-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #e84040; z-index: 10; pointer-events: none; }
  .now-dot { position: absolute; top: -3px; left: -3px; width: 8px; height: 8px; border-radius: 50%; background: #e84040; }

// ============================================================
// DATE UTILITIES
// ============================================================
function parseDate(s){var p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2])}
function dateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
// Week start = Sunday
function weekStart(d){var r=new Date(d);r.setDate(r.getDate()-r.getDay());return r}

function categorize(dateObj, today, isFuture) {
  var todayWS = weekStart(today), dateWS = weekStart(dateObj);
  if (sameDay(dateObj, today)) return 'hoy';
  if (isFuture) {
    if (sameDay(dateWS, todayWS)) return 'esta semana';
    var nws = new Date(todayWS); nws.setDate(nws.getDate()+7);
    if (sameDay(dateWS, nws)) return 'próxima semana';
    if (dateObj.getMonth()===today.getMonth()&&dateObj.getFullYear()===today.getFullYear()) return 'este mes';
    var nm=today.getMonth()+1, ny=nm>11?today.getFullYear()+1:today.getFullYear();
    if (dateObj.getMonth()===(nm%12)&&dateObj.getFullYear()===ny) return 'próximo mes';
    if (dateObj.getFullYear()===today.getFullYear()) return 'este año';
    return 'próximo año';
  } else {
    if (sameDay(dateWS, todayWS)) return 'esta semana';
    var pws = new Date(todayWS); pws.setDate(pws.getDate()-7);
    if (sameDay(dateWS, pws)) return 'semana pasada';
    if (dateObj.getMonth()===today.getMonth()&&dateObj.getFullYear()===today.getFullYear()) return 'este mes';
    var pm=today.getMonth()-1, py=pm<0?today.getFullYear()-1:today.getFullYear();
    if (dateObj.getMonth()===((pm+12)%12)&&dateObj.getFullYear()===py) return 'mes pasado';
    if (dateObj.getFullYear()===today.getFullYear()) return 'este año';
    return 'año pasado';
  }
}

var FUTURE_ORDER = ['hoy','esta semana','próxima semana','este mes','próximo mes','este año','próximo año'];
var PAST_ORDER = ['esta semana','semana pasada','este mes','mes pasado','este año','año pasado'];

// ============================================================
// RENDER
// ============================================================
function render() {
  var cal = document.getElementById('calendar');
  var now = new Date();
  var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var todayS = dateStr(today);
  var nowMins = now.getHours()*60+now.getMinutes();

  document.getElementById('subtitle').textContent =
    MONTH_NAMES[today.getMonth()].charAt(0).toUpperCase()+MONTH_NAMES[today.getMonth()].slice(1)+' '+today.getFullYear();

  var hm = document.getElementById('hour-markers'), hmH='';
  for(var h=6;h<=23;h++) hmH+='<span>'+h+':00</span>';
  hm.innerHTML=hmH;

  var allDates = Object.keys(DAYS).sort();
  var todayDays=[], futureDays=[], pastDays=[];
  for(var i=0;i<allDates.length;i++){
    var ds=allDates[i], d=parseDate(ds);
    if(sameDay(d,today)) todayDays.push(ds);
    else if(d>today) futureDays.push(ds);
    else pastDays.push(ds);
  }
  pastDays.reverse();

  function renderTimeline(blocks, isToday) {
    var out='';
    for(var i=0;i<blocks.length;i++){
      var b=blocks[i];
      var cs=Math.max(b.start,RANGE_START), ce=Math.min(b.end,RANGE_END);
      if(ce<=cs) continue;
      var left=((cs-RANGE_START)/RANGE_TOTAL)*100;
      var width=((ce-cs)/RANGE_TOTAL)*100;
      var minW=b.cls==='b-sleep'?Math.max(width,7):Math.max(width,5);
      var displayLabel=b.label;
      if(b.cls==='b-grog'&&b.start>0) displayLabel='⏰ '+fmtM(b.start);
      var timeStr=b.time?'<span class="time-label">'+fmtM(cs)+'</span><span class="time-label-end">'+fmtM(ce)+'</span>':'';
      out+='<div class="block '+b.cls+'" style="position:absolute;left:'+left+'%;width:'+minW+'%;height:100%" title="'+b.label+': '+fmtM(cs)+' - '+fmtM(ce)+'">'+(minW>5?displayLabel:'')+(minW>12?timeStr:'')+'</div>';
    }
    if(isToday&&nowMins>=RANGE_START&&nowMins<=RANGE_END){
      var nl=((nowMins-RANGE_START)/RANGE_TOTAL)*100;
      out+='<div class="now-line" style="left:'+nl+'%"><div class="now-dot"></div></div>';
    }
    return out;
  }

  function renderDay(ds, isToday) {
    var d=parseDate(ds), day=DAYS[ds];
    var dow=DOW_NAMES[d.getDay()];
    var dateLabel=d.getDate()+' '+MONTH_NAMES[d.getMonth()].slice(0,3);
    var h='';
    if(day.actual){
      h+='<div class="day-row'+(isToday?' today':'')+'"><div class="day-label"><span class="dow">'+dow+'</span><span class="date">'+dateLabel+'</span></div><div class="dual-timeline"><div class="timeline-layer"><span class="row-label-tag">REAL</span>'+renderTimeline(day.actual,isToday)+'</div><div class="timeline-layer"><span class="row-label-tag">PLAN</span>'+renderTimeline(day.plan,false)+'</div></div></div>';
    } else {
      h+='<div class="day-row'+(isToday?' today':'')+'"><div class="day-label"><span class="dow">'+dow+'</span><span class="date">'+dateLabel+'</span></div><div class="timeline">'+renderTimeline(day.plan,isToday)+'</div></div>';
    }
    return h;
  }

  function renderGrouped(days, isFuture) {
    var order=isFuture?FUTURE_ORDER:PAST_ORDER;
    var groups={};
    for(var i=0;i<days.length;i++){
      var ds=days[i], cat=categorize(parseDate(ds),today,isFuture);
      if(!groups[cat]) groups[cat]=[];
      groups[cat].push(ds);
    }
    var h='';
    for(var j=0;j<order.length;j++){
      var cat=order[j];
      if(!groups[cat]||groups[cat].length===0) continue;
      h+='<div class="week-label">'+cat.charAt(0).toUpperCase()+cat.slice(1)+'</div>';
      for(var k=0;k<groups[cat].length;k++) h+=renderDay(groups[cat][k],false);
    }
    return h;
  }

  var html='';

  // TODAY
  if(todayDays.length){
    html+='<div class="week-label">Hoy</div>';
    for(var i=0;i<todayDays.length;i++) html+=renderDay(todayDays[i],true);
  }

  // FUTURE
  if(futureDays.length){
    html+='<div style="height:8px"></div>';
    html+=renderGrouped(futureDays,true);
  }

  // PAST (collapsible)
  if(pastDays.length){
    html+='<div style="height:16px"></div>';
    html+='<details class="past-section"><summary class="week-label" style="cursor:pointer;user-select:none;">Días anteriores ▸</summary><div style="margin-top:8px">';
    html+=renderGrouped(pastDays,false);
    html+='</div></details>';
  }

  cal.innerHTML=html;

  // Status banner
  var banner=document.getElementById('status-banner');
  if(DAYS[todayS]){
    var dayData=DAYS[todayS], blocks=dayData.actual||dayData.plan, current=null;
    for(var i=0;i<blocks.length;i++){if(nowMins>=blocks[i].start&&nowMins<blocks[i].end){current=blocks[i];break;}}
    if(current){
      var endStr=fmtM(Math.min(current.end,RANGE_END));
      var msgs={'b-sleep':['sleeping','😴 Durmiendo — no molestar'],'b-grog':['waking','☕ Despertando — disponible para cosas rápidas'],'b-work':['busy-work','💼 Trabajando — no disponible hasta las '+endStr],'b-break':['available','🍽️ Comida y familia — disponible'],'b-design':['busy-design','🏠 Diseño ME125 — trabajando juntos hasta las '+endStr],'b-family':['available','👨‍👩‍👧 Tiempo de familia — disponible'],'b-rec':['available','🎮 Tiempo recreativo — disponible'],'b-personal':['available','🧘 Tiempo personal']};
      var info=msgs[current.cls]||['available','Disponible'];
      banner.className='status-banner '+info[0];
      banner.innerHTML=info[1];
      banner.style.display='block';
    } else { banner.style.display='none'; }
  } else {
    banner.innerHTML='📋 No hay programación para hoy';
    banner.className='status-banner available';
    banner.style.display='block';
  }
}
render();
setInterval(render,60000);
</script>
